<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UbuntuTrade</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1><a href="index.html">UbuntuTrade</a></h1>
        <div class="user-links">
            <a href="register.html">Register</a>
        </div>
    </div>
    <div class="content">
        <div class="login-box">
            <h2>Login</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:20px;">Access your UbuntuTrade account</p>
            <form action="php/login.php" method="POST">
                <label>Email address</label>
                <input type="email" name="email" required>

                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="loginPassword" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                        Show
                    </button>
                </div>

                <button type="submit" style="width:100%;margin-top:8px;">Login</button>
            </form>

            <!-- Forgot Password link -->
            <p style="margin-top:12px;font-size:0.85rem;text-align:center;">
                <a href="forgot_password.html" style="color:#666;text-decoration:none;border-bottom:1px solid #ddd;padding-bottom:2px;">Forgot password?</a>
            </p>

            <p style="margin-top:8px;font-size:0.85rem;text-align:center;">New here? <a href="register.html">Create an account</a></p>
            <p style="margin-top:8px;font-size:0.75rem;text-align:center;color:#999;">Demo admin: admin@ubuntutrade.co.za / admin123</p>
        </div>
    </div>
    <div class="footer">
        <div class="footer-content">
            <div class="footer-left">
                &copy; 2026 UbuntuTrade – C2C for SA informal economy
            </div>
            <div class="footer-contact">
                <span class="contact-item">
                    <span class="icon">✉</span>
                    <a href="mailto:support@ubuntutrade.co.za">support@ubuntutrade.co.za</a>
                </span>
                <span class="contact-item">
                    <span class="icon">📞</span>
                    <span>012 234 4567</span>
                </span>
                <span class="contact-item">
                    <span class="icon">📍</span>
                    <span>Johannesburg, South Africa</span>
                </span>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            button.textContent = 'Hide';
        } else {
            input.type = 'password';
            button.textContent = 'Show';
        }
    }
</script>
</body>
</html>
