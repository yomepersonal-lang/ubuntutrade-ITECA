<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Requests - UbuntuTrade Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1><a href="index.html" style="color:white;">Admin</a></h1>
        <div class="user-links"><a href="../php/logout.php">Logout</a></div>
    </div>
    <div class="content">
        <div class="back-button" style="margin-bottom:20px;">
            <button onclick="history.back()" class="btn-back">← Back</button>
        </div>
        <h2>Verification Requests</h2>
        <p style="color:#666;margin-bottom:20px;">Review and approve/reject seller verification requests.</p>
        <div id="requestsTable">Loading requests...</div>
    </div>
    <div class="footer">&copy; 2026 UbuntuTrade</div>
</div>

<script>
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function fetchJSON(url, options = {}) {
        const response = await fetch(url, options);
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('Invalid JSON from', url, 'Raw:', text);
            throw new Error('Invalid JSON response');
        }
    }

    async function loadRequests() {
        const container = document.getElementById('requestsTable');
        try {
            const data = await fetchJSON('../php/admin_get_verification_requests.php');
            if (data.error) {
                container.innerHTML = `<p class="error">Error: ${escapeHtml(data.error)}</p>`;
                return;
            }
            if (!Array.isArray(data)) {
                container.innerHTML = `<p class="error">Unexpected response format.</p>`;
                return;
            }
            if (data.length === 0) {
                container.innerHTML = '<p style="color:#888;">No pending verification requests.</p>';
                return;
            }
            let html = '<table><tr><th>ID</th><th>Seller</th><th>Email</th><th>ID Number</th><th>Requested</th><th>Actions</th></tr>';
            data.forEach(r => {
                html += `<tr>
                            <td>${r.request_id}</td>
                            <td>${escapeHtml(r.full_name)}</td>
                            <td>${escapeHtml(r.email)}</td>
                            <td>${escapeHtml(r.id_number)}</td>
                            <td>${new Date(r.requested_at).toLocaleString()}</td>
                            <td>
                                <button onclick="handleRequest(${r.request_id}, 'approve')" style="background:#2c5e2e;">Approve</button>
                                <button onclick="handleRequest(${r.request_id}, 'reject')" style="background:#b33c3c;">Reject</button>
                            </td>
                         </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch(err) {
            container.innerHTML = `<p class="error">Failed to load requests: ${escapeHtml(err.message)}</p>`;
        }
    }

    async function handleRequest(requestId, action) {
        if (!confirm(`Are you sure you want to ${action} this verification request?`)) return;
        try {
            const data = await fetchJSON('../php/admin_verify_seller.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `request_id=${requestId}&action=${action}`
            });
            if (data.success) {
                alert(data.message);
                loadRequests();
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
            }
        } catch(err) {
            alert('Request failed: ' + err.message);
        }
    }

    loadRequests();
</script>
</body>
</html>
