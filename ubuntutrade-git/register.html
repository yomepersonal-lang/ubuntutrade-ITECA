<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UbuntuTrade</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1><a href="index.html">UbuntuTrade</a></h1>
        <div class="user-links">
            <a href="login.html">Login</a>
        </div>
    </div>
    <div class="content">
        <div class="login-box">
            <h2>Create Account</h2>
            <p style="font-size:0.85rem;color:#666;margin-bottom:20px;">Join the UbuntuTrade community</p>
            <form action="php/register.php" method="POST">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
                <label>Email</label>
                <input type="email" name="email" required>
                <label>Phone (optional)</label>
                <input type="text" name="phone">
                <label>Password</label>
                <input type="password" name="password" required>
                <label>I want to:</label>
                <select name="role">
                    <option value="2">Buy only</option>
                    <option value="3">Sell and buy</option>
                </select>
                <button type="submit" style="width:100%;margin-top:8px;">Register</button>
            </form>
            <p style="margin-top:20px;font-size:0.85rem;text-align:center;">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <div class="footer">&copy; 2026 UbuntuTrade</div>
</div>
</body>
</html>
