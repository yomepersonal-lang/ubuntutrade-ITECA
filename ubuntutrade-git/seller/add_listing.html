<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - UbuntuTrade</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .error-msg {
            color: #b33c3c;
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        input.error {
            border-color: #b33c3c;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-bar">
            <h1><a href="../index.html">UbuntuTrade</a></h1>
            <div class="user-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="../php/logout.php">Logout</a>
            </div>
        </div>
        <div class="content">
            <div class="back-button" style="margin-bottom:20px;">
                <button onclick="history.back()" class="btn-back">← Back</button>
            </div>
            <h2>Add New Product</h2>
            <form action="../php/seller_add_listing.php" method="POST" enctype="multipart/form-data" id="addListingForm"
                style="max-width:600px;">
                <label>Title</label>
                <input type="text" name="title" required>

                <label>Description</label>
                <textarea name="description" rows="4"></textarea>

                <label>Price (R)</label>
                <input type="number" step="0.01" name="price" id="price" required min="0.01">
                <div class="error-msg" id="priceError">Price must be greater than R0.00</div>

                <label>Category</label>
                <select name="category" required>
                    <option value="">Select a category...</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Home & Garden">Home & Garden</option>
                    <option value="Beauty & Health">Beauty & Health</option>
                    <option value="Automotive">Automotive</option>
                    <option value="Sports & Outdoors">Sports & Outdoors</option>
                    <option value="Toys & Games">Toys & Games</option>
                    <option value="Other">Other</option>
                </select>

                <label>Image</label>
                <input type="file" name="image">

                <button type="submit" style="margin-top:8px;">Create Listing</button>
            </form>
        </div>
        <div class="footer">
            <div class="footer-content">
                <div class="footer-left">
                    &copy; 2026 UbuntuTrade – C2C for SA informal economy
                </div>
                <div class="footer-contact">
                    <span class="contact-item">
                        <span class="icon">✉</span>
                        <a href="mailto:support@ubuntutrade.co.za">support@ubuntutrade.co.za</a>
                    </span>
                    <span class="contact-item">
                        <span class="icon">📞</span>
                        <span>012 234 4567</span>
                    </span>
                    <span class="contact-item">
                        <span class="icon">📍</span>
                        <span>Johannesburg, South Africa</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('addListingForm').addEventListener('submit', function (e) {
            const priceInput = document.getElementById('price');
            const price = parseFloat(priceInput.value);
            const errorMsg = document.getElementById('priceError');

            if (isNaN(price) || price <= 0) {
                e.preventDefault();
                priceInput.classList.add('error');
                errorMsg.classList.add('show');
                return false;
            } else {
                priceInput.classList.remove('error');
                errorMsg.classList.remove('show');
            }
            return true;
        });

        // Remove error state when user types
        document.getElementById('price').addEventListener('input', function () {
            const price = parseFloat(this.value);
            const errorMsg = document.getElementById('priceError');
            if (!isNaN(price) && price > 0) {
                this.classList.remove('error');
                errorMsg.classList.remove('show');
            }
        });
        
        // Check for error parameters
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === 'invalid_price') {
            alert('Invalid price. Price must be greater than R0.00.');
            document.getElementById('price').classList.add('error');
            document.getElementById('priceError').classList.add('show');
        }
    </script>
</body>

</html>
