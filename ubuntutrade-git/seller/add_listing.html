<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - UbuntuTrade</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1><a href="../index.html">UbuntuTrade</a></h1>
        <div class="user-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="../php/logout.php">Logout</a>
        </div>
    </div>
    <div class="content">
        <div class="back-button" style="margin-bottom:20px;">
            <button onclick="history.back()" class="btn-back">← Back</button>
        </div>
        <h2>Add New Product</h2>
        <form action="../php/seller_add_listing.php" method="POST" enctype="multipart/form-data" style="max-width:600px;">
            <label>Title</label>
            <input type="text" name="title" required>
            <label>Description</label>
            <textarea name="description" rows="4"></textarea>
            <label>Price (R)</label>
            <input type="number" step="0.01" name="price" required>
            <label>Category</label>
            <input type="text" name="category">
            <label>Image</label>
            <input type="file" name="image">
            <button type="submit" style="margin-top:8px;">Create Listing</button>
        </form>
    </div>
    <div class="footer">&copy; 2026 UbuntuTrade</div>
</div>
</body>
</html>
